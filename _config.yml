title: Technical Portfolio
description: Systems, security, and software engineering work focused on diagnosing problems, building tools, and understanding system behaviour under failure.

remote_theme: mmistakes/minimal-mistakes

minimal_mistakes_skin: dark

plugins:
  - jekyll-include-cache
  - jekyll-sitemap

markdown: kramdown

header_pages:
  - index.md
  - case-studies.md
  - projects.md
  - about.md

search: true

search_provider: lunr

show_excerpts: false

last_modified_at: " "

atom_feed:
  hide: true

collections:
  case_studies:
    output: true
    permalink: /case-studies/:path/
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: case_studies
    values:
      layout: single
      classes: wide
      last_modified_at: null
      read_time: false
      show_date: false
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      classes: wide
      last_modified_at: null
      read_time: false
      show_date: false